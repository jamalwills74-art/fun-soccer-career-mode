<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poluser Pro Career 26</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0c0f12;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 420px;
            background: #161b22;
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.7);
            border: 1px solid #30363d;
            box-sizing: border-box;
        }
        h2, h3 { color: #00ff88; text-align: center; margin-top: 0; }
        .screen { display: none; }
        .active { display: block; }
        
        .hud {
            background: #0d1117;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            font-size: 13px;
            border: 1px solid #21262d;
        }
        .hud-item { font-weight: bold; color: #8b949e; }
        .hud-item span { color: #fff; }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            background: #0d1117;
            padding: 6px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #21262d;
            gap: 2px;
        }
        .nav-btn {
            background: none;
            border: none;
            color: #8b949e;
            font-weight: bold;
            font-size: 10px;
            cursor: pointer;
            padding: 6px 2px;
            border-radius: 6px;
            flex: 1;
            text-align: center;
        }
        .nav-btn.active-tab { background: #00ff88; color: #000; }

        label { display: block; margin: 8px 0 4px; font-size: 14px; color: #c9d1d9; }
        input, select {
            width: 100%;
            padding: 10px;
            background: #21262d;
            border: 1px solid #30363d;
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        .btn {
            display: block;
            width: 100%;
            background: #00ff88;
            color: #000;
            border: none;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }
        .btn:hover { background: #00cc6e; }

        .scoreboard {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .live-timer { color: #ff3333; font-size: 14px; }
        
        .pitch-container {
            background: #1e4620;
            border: 2px solid #fff;
            border-radius: 8px;
            height: 120px;
            margin: 10px 0;
            position: relative;
            overflow: hidden;
        }
        .center-circle {
            border: 2px solid rgba(255,255,255,0.4);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .ball {
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transition: all 0.2s linear;
        }
        
        .list-card {
            background: #21262d;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #30363d;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-top: 5px;
        }
        th, td {
            padding: 6px;
            text-align: left;
            border-bottom: 1px solid #30363d;
        }
        th { color: #8b949e; }
        .highlight-row { background: rgba(0, 255, 136, 0.15); font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="screen-setup" class="screen active">
        <h2>⚽ Create Pro Player</h2>
        <label>First Name</label>
        <input type="text" id="setup-first" value="Poluser">
        
        <label>Last Name</label>
        <input type="text" id="setup-last" value="Seven">

        <label>Position</label>
        <select id="setup-pos">
            <option value="ST">Striker (ST)</option>
            <option value="LW">Left Winger (LW)</option>
            <option value="CAM">Midfielder (CAM)</option>
            <option value="CB">Center Back (CB)</option>
            <option value="GK">Goalkeeper (GK)</option>
        </select>

        <label>Select Nationality</label>
        <select id="setup-nation" onchange="loadInitialLeagues()"></select>

        <label>Select League</label>
        <select id="setup-league" onchange="populateClubs()"></select>

        <label>Select Club Team</label>
        <select id="setup-club"></select>

        <label>Starting Career Path</label>
        <select id="setup-path">
            <option value="underdog">Academy Underdog (35-55 OVR)</option>
            <option value="potential">Top Prospect (55-80 OVR)</option>
            <option value="legend">The Next Legend (80-100 OVR)</option>
        </select>

        <button class="btn" onclick="startGame()">Kick Off Career</button>
    </div>

    <div id="game-hub" style="display:none;">
        <div class="hud">
            <div class="hud-item">Player: <span id="hud-name">-</span></div>
            <div class="hud-item">Age/Season: <span id="hud-age">16</span>/25</div>
            <div class="hud-item">Club: <span id="hud-club">-</span></div>
            <div class="hud-item">Nation: <span id="hud-nation">-</span></div>
            <div class="hud-item">OVR: <span id="hud-ovr" style="color:#00ff88">0</span></div>
            <div class="hud-item">Coins: <span id="hud-coins" style="color:#00ff88">0</span></div>
            <div class="hud-item">Energy: <span id="hud-energy">100%</span></div>
            <div class="hud-item">Status: <span id="hud-status" style="color:#00ff88">Academy</span></div>
        </div>

        <div class="nav-bar">
            <button class="nav-btn active-tab" id="tab-match" onclick="showTab('match')">MATCH</button>
            <button class="nav-btn" id="tab-standings" onclick="showTab('standings')">TABLES</button>
            <button class="nav-btn" id="tab-skills" onclick="showTab('skills')">SKILLS</button>
            <button class="nav-btn" id="tab-social" onclick="showTab('social')">RELATIONS</button>
            <button class="nav-btn" id="tab-shop" onclick="showTab('shop')">SHOP</button>
        </div>

        <div id="view-match" class="tab-view">
            <h3 id="match-type-header">Matchday</h3>
            
            <div class="scoreboard">
                <span id="sb-home">HOME</span>
                <span id="sb-score" style="color:#00ff88; font-size:18px;">0 - 0</span>
                <span id="sb-away">AWAY</span>
                <span class="live-timer" id="sb-timer">00'</span>
            </div>
            
            <div class="pitch-container">
                <div class="center-circle"></div>
                <div class="ball" id="pitch-ball"></div>
            </div>
            
            <div id="match-ticker" style="font-style: italic; min-height: 45px; text-align: center; color: #8b949e; margin-bottom: 10px; font-size: 13px;">Ready for kick-off.</div>
            <button class="btn" id="play-match-btn" onclick="runMatchEngine()">Play Match</button>
        </div>

        <div id="view-standings" class="tab-view" style="display:none;">
            <h3 id="table-title">League Table</h3>
            <div style="overflow-y: auto; max-height: 280px;">
                <table>
                    <thead>
                        <tr><th>Pos</th><th>Team</th><th>OVR</th><th>P</th><th>Pts</th></tr>
                    </thead>
                    <tbody id="standings-body"></tbody>
                </table>
            </div>
        </div>
